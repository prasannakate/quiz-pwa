<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Quiz Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans antialiased">
  
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col justify-between">
    <header class="bg-indigo-600 text-white py-4 px-6 text-center font-bold text-lg tracking-wide shadow-sm">
      🏆 Daily Quiz Challenge
    </header>
    
    <main id="app-content" class="p-6 flex-grow overflow-y-auto">
      <div class="text-center py-10">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600 mx-auto"></div>
        <p class="mt-2 text-sm text-slate-500">Connecting to Cloud Sheet API...</p>
      </div>
    </main>
  </div>

  <script>
    // ⚠️ REPLACE THIS URL WITH YOUR LIVE DEPLOYED GOOGLE APPS SCRIPT WEB APP URL
    const API_URL = "https://script.google.com/macros/s/AKfycbxcfjreLZeb6W1f1ac3PC1lthkvR2U6gGnAKXrn_kdMHRVIo-nsb2QRqYzPojU9aPem/exec";
    let currentUserEmail = localStorage.getItem('quiz_user_email') || '';

    window.addEventListener('load', () => {
      if (!currentUserEmail) {
        renderRegistration();
      } else {
        loadDashboard();
      }
    });

    // Helper function to handle async communication with Google Apps Script
    async function callAPI(action, data = {}) {
      try {
        const payload = { action: action, email: currentUserEmail, ...data };
        // We pass the string payload directly without application/json header to avoid CORS blocks
        const response = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        return await response.json();
      } catch (error) {
        console.error("API Communication Failure:", error);
        alert("Network error processing request.");
      }
    }

    function renderRegistration() {
      document.getElementById('app-content').innerHTML = `
        <div class="space-y-4">
          <h2 class="text-xl font-bold text-slate-900">Create Account</h2>
          <p class="text-xs text-slate-500">Register to initialize daily quiz sequences.</p>
          <input id="reg-fn" type="text" placeholder="First Name" class="w-full border p-2 rounded text-sm">
          <input id="reg-ln" type="text" placeholder="Last Name" class="w-full border p-2 rounded text-sm">
          <input id="reg-phone" type="tel" placeholder="Mobile Number" class="w-full border p-2 rounded text-sm">
          <input id="reg-inst" type="text" placeholder="Institute Name" class="w-full border p-2 rounded text-sm">
          <input id="reg-email" type="email" placeholder="Email Address" class="w-full border p-2 rounded text-sm">
          <button onclick="handleRegister()" class="w-full bg-indigo-600 text-white p-2.5 rounded font-medium text-sm hover:bg-indigo-700">Register Now</button>
        </div>
      `;
    }

    async function handleRegister() {
      const data = {
        firstName: document.getElementById('reg-fn').value,
        lastName: document.getElementById('reg-ln').value,
        mobile: document.getElementById('reg-phone').value,
        institute: document.getElementById('reg-inst').value,
        email: document.getElementById('reg-email').value
      };

      const res = await callAPI('register', { data: data });
      if(res && res.success) {
        alert(res.message);
        localStorage.setItem('quiz_user_email', data.email);
        currentUserEmail = data.email;
        loadDashboard();
      } else {
        alert(res ? res.error : "Registration failed.");
      }
    }

    async function loadDashboard() {
      const data = await callAPI('getDashboard');
      if(data && data.error) {
        alert(data.error);
        localStorage.removeItem('quiz_user_email');
        renderRegistration();
        return;
      }
      renderDashboard(data);
    }

    function renderDashboard(data) {
      let leaderboardHtml = data.leaderboard.map((user, i) => `
        <div class="flex justify-between items-center bg-slate-50 p-2.5 rounded text-sm">
          <span class="font-medium">${i+1}. ${user.name}</span>
          <span class="text-indigo-600 font-bold">${user.score} pts</span>
        </div>
      `).join('');

      document.getElementById('app-content').innerHTML = `
        <div class="space-y-6">
          <div class="grid grid-cols-2 gap-4">
            <div class="bg-indigo-50 p-4 rounded-xl text-center">
              <span class="text-xs font-semibold uppercase text-indigo-600">Attempted</span>
              <h3 class="text-2xl font-black mt-1 text-indigo-900">${data.attemptedCount}</h3>
            </div>
            <div class="bg-emerald-50 p-4 rounded-xl text-center">
              <span class="text-xs font-semibold uppercase text-emerald-600">Total Score</span>
              <h3 class="text-2xl font-black mt-1 text-emerald-900">${data.totalScore}</h3>
            </div>
          </div>
          <div class="border-t pt-4">
            <h4 class="font-bold text-slate-900 mb-2">🔥 Top 3 Global Leaderboard</h4>
            <div class="space-y-2">${leaderboardHtml || '<p class="text-xs text-slate-400">No active scores recorded yet</p>'}</div>
          </div>
          <button onclick="alert('Quiz system processing...')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-sm shadow-md">Start Today's Quiz</button>
          <button onclick="triggerAccountDeletion()" class="w-full text-xs text-rose-500 font-medium opacity-60 hover:opacity-100 transition mt-10">Close Profile & WIPE Data</button>
        </div>
      `;
    }

    async function triggerAccountDeletion() {
      let reason = prompt("Please provide a reason for closing your account:");
      if (reason) {
        const res = await callAPI('closeAccount', { reason: reason });
        if(res && res.success) {
          alert("Your account data has been completely wiped.");
          localStorage.removeItem('quiz_user_email');
          location.reload();
        }
      }
    }
  </script>
</body>
</html>
