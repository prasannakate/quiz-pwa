<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Quiz Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-800 min-h-screen font-sans antialiased">
  
  <!-- Main Viewport Box - Formatted to render beautifully on mobile devices -->
  <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col justify-between relative">
    
    <!-- Header Navigation -->
    <header class="bg-indigo-600 text-white py-4 px-6 text-center font-bold text-lg tracking-wide shadow-md shrink-0">
      🏆 Daily Quiz Challenge
    </header>
    
    <!-- Core Context Switchboard Target -->
    <main id="app-content" class="p-6 flex-grow overflow-y-auto">
      <div class="text-center py-20">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
        <p class="mt-4 text-sm text-slate-500 font-medium">Contacting Cloud Sheet Data Pipelines...</p>
      </div>
    </main>

  </div>

  <script>
    // ⚠️ REPLACE THIS STRING VALUE WITH YOUR DEPLOYED APPS SCRIPT EXEC ENDPOINT URL
    const API_URL = "https://script.google.com/macros/s/AKfycbxe3EeWSiNtJbd52LBHsdtOuepyzMRFFSzFxMbnJhamDf07gXbRuCpSw1Pvo7c0cG3m/exec";
    
    let currentUserEmail = localStorage.getItem('quiz_user_email') || '';
    let quizQuestions = [];
    let currentQuestionIndex = 0;
    let userSelections = [];
    let correctAnswersCount = 0;

    window.addEventListener('load', () => {
      if (!currentUserEmail) {
        renderAuth('login');
      } else {
        loadDashboard();
      }
    });

    // Unified client fetch controller
    async function callAPI(action, data = {}) {
      try {
        const payload = { action: action, email: currentUserEmail, ...data };
        
        // Include admin password in requests if the user is authenticated as an admin
        const adminPass = sessionStorage.getItem('admin_password');
        if (adminPass) {
          payload.password = adminPass;
        }
        
        // Content-Type must remain text/plain to force browsers to skip CORS preflight OPTIONS requests
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=utf-8'
          },
          body: JSON.stringify(payload),
          redirect: 'follow'
        });
        
        if (!response.ok) {
          throw new Error("HTTP status channel returned code: " + response.status);
        }
        
        return await response.json();
      } catch (error) {
        console.error("Critical Interface Transmission Interruption:", error);
        alert("Server network request failed. Check the console to verify execution rules or endpoint formats.");
        return { success: false, error: error.toString() };
      }
    }

    // Displays the sign-in/register switcher tabs
    function renderAuth(view = 'login') {
      const isLogin = view === 'login';
      document.getElementById('app-content').innerHTML = `
        <div class="space-y-6">
          <div class="flex border-b border-slate-200">
            <button onclick="renderAuth('login')" class="w-1/2 pb-3 text-sm font-bold border-b-2 transition ${isLogin ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">Sign In</button>
            <button onclick="renderAuth('register')" class="w-1/2 pb-3 text-sm font-bold border-b-2 transition ${!isLogin ? 'border-indigo-600 text-indigo-600' : 'border-transparent text-slate-400 hover:text-slate-600'}">Register</button>
          </div>

          ${isLogin ? renderLoginForm() : renderRegisterForm()}
          
          <div class="pt-6 text-center border-t border-slate-100">
            <button onclick="renderAdminLogin()" class="text-xs text-slate-400 hover:text-indigo-600 font-semibold transition">
              Access Admin Console ⚙️
            </button>
          </div>
        </div>
      `;
    }

    function renderLoginForm() {
      return `
        <div class="space-y-4">
          <div class="text-center pb-2">
            <h2 class="text-2xl font-bold text-slate-900">Welcome Back</h2>
            <p class="text-sm text-slate-500 mt-1">Enter your registered email to access your profile portal.</p>
          </div>
          
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email Address</label>
              <input id="login-email" type="email" class="w-full border border-slate-200 p-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="student@example.com">
            </div>
            
            <button onclick="handleLogin()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm tracking-wide shadow-md hover:bg-indigo-700 transition mt-4">
              Sign In to Portal
            </button>
          </div>
        </div>
      `;
    }

    function renderRegisterForm() {
      return `
        <div class="space-y-4">
          <div class="text-center pb-2">
            <h2 class="text-2xl font-bold text-slate-900">Student Onboarding</h2>
            <p class="text-sm text-slate-500 mt-1">Complete enrollment to unlock access permissions.</p>
          </div>
          
          <div class="space-y-3">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">First Name</label>
              <input id="reg-fn" type="text" class="w-full border border-slate-200 p-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Last Name</label>
              <input id="reg-ln" type="text" class="w-full border border-slate-200 p-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Mobile Number</label>
              <input id="reg-phone" type="tel" class="w-full border border-slate-200 p-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Institute Name</label>
              <input id="reg-inst" type="text" class="w-full border border-slate-200 p-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Email Address</label>
              <input id="reg-email" type="email" class="w-full border border-slate-200 p-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
            </div>
            
            <button onclick="handleRegister()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold text-sm tracking-wide shadow-md hover:bg-indigo-700 transition mt-4">
              Register Portal Profile
            </button>
          </div>
        </div>
      `;
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      if (!email) {
        alert("Email field is mandatory to locate your account profile.");
        return;
      }

      document.getElementById('app-content').innerHTML = `
        <div class="text-center py-20">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
          <p class="mt-4 text-sm text-slate-500">Verifying account credentials...</p>
        </div>
      `;

      currentUserEmail = email;
      const res = await callAPI('getDashboard');

      if (res && res.error) {
        alert(res.error);
        currentUserEmail = '';
        renderAuth('login');
      } else {
        localStorage.setItem('quiz_user_email', email);
        renderDashboard(res);
      }
    }

    async function handleRegister() {
      const data = {
        firstName: document.getElementById('reg-fn').value.trim(),
        lastName: document.getElementById('reg-ln').value.trim(),
        mobile: document.getElementById('reg-phone').value.trim(),
        institute: document.getElementById('reg-inst').value.trim(),
        email: document.getElementById('reg-email').value.trim()
      };

      if (!data.firstName || !data.lastName || !data.mobile || !data.institute || !data.email) {
        alert("All fields are mandatory to secure an authentication profile.");
        return;
      }

      document.getElementById('app-content').innerHTML = `
        <div class="text-center py-20">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
          <p class="mt-4 text-sm text-slate-500">Writing data and executing verification dispatch...</p>
        </div>
      `;

      const res = await callAPI('register', { data: data });
      if (res && res.success) {
        alert(res.message);
        localStorage.setItem('quiz_user_email', data.email);
        currentUserEmail = data.email;
        loadDashboard();
      } else {
        alert(res && res.error ? res.error : "Registration was rejected by the server.");
        renderAuth('register');
      }
    }

    async function loadDashboard() {
      document.getElementById('app-content').innerHTML = `
        <div class="text-center py-20">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
          <p class="mt-4 text-sm text-slate-500">Synchronizing statistics and ranking tiers...</p>
        </div>
      `;

      const data = await callAPI('getDashboard');
      if (data && data.error) {
        alert(data.error);
        localStorage.removeItem('quiz_user_email');
        currentUserEmail = '';
        renderAuth('login');
        return;
      }
      renderDashboard(data);
    }

    function renderDashboard(data) {
      let leaderboardHtml = data.leaderboard.map((user, i) => `
        <div class="flex justify-between items-center bg-slate-50 p-3 rounded-lg border border-slate-100">
          <div class="flex items-center space-x-2">
            <span class="text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full ${i === 0 ? 'bg-amber-100 text-amber-700' : 'bg-slate-200 text-slate-700'}">${i+1}</span>
            <span class="font-medium text-sm text-slate-700">${user.name}</span>
          </div>
          <span class="text-indigo-600 font-bold text-sm">${user.score} pts</span>
        </div>
      `).join('');

      let actionBtn = `<button onclick="startQuizFlow()" class="w-full bg-indigo-600 text-white py-3.5 rounded-xl font-bold text-sm tracking-wide shadow-md hover:bg-indigo-700 transition">Start Today's Quiz</button>`;
      if (data.todayAttempted) {
        actionBtn = `<div class="bg-emerald-50 border border-emerald-200 text-emerald-800 text-center py-3 rounded-xl text-sm font-semibold">✓ You completed today's quiz! Come back tomorrow.</div>`;
      }

      document.getElementById('app-content').innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-start">
            <div>
              <h2 class="text-xl font-bold text-slate-900">Welcome, ${data.firstName}!</h2>
              <p class="text-xs text-slate-400">Review metrics or load dynamic content loops.</p>
            </div>
            <button onclick="handleLogout()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-bold transition">
              Logout
            </button>
          </div>

          <div class="grid grid-cols-2 gap-4">
            <div class="bg-indigo-50 border border-indigo-100 p-4 rounded-xl text-center">
              <span class="text-xs font-bold uppercase tracking-wider text-indigo-600">Attempted</span>
              <h3 class="text-3xl font-black mt-1 text-indigo-900">${data.attemptedCount}</h3>
            </div>
            <div class="bg-emerald-50 border border-emerald-100 p-4 rounded-xl text-center">
              <span class="text-xs font-bold uppercase tracking-wider text-emerald-600">Cumulative Score</span>
              <h3 class="text-3xl font-black mt-1 text-emerald-900">${data.totalScore}</h3>
            </div>
          </div>

          <div class="bg-slate-50/50 p-4 rounded-xl border border-slate-150">
            <h4 class="font-bold text-slate-800 text-sm mb-3">⭐ Top Performers Dashboard</h4>
            <div class="space-y-2">${leaderboardHtml || '<p class="text-xs text-slate-400 py-2">No submission data logged yet.</p>'}</div>
          </div>

          <div class="pt-2">
            ${actionBtn}
          </div>

          <div class="border-t pt-4 text-center">
            <button onclick="triggerAccountDeletion()" class="text-xs text-rose-500 font-semibold hover:underline opacity-60 hover:opacity-100 transition">
              Close Profile & WIPE Storage Rows
            </button>
          </div>
        </div>
      `;
    }

    function handleLogout() {
      if (confirm("Are you sure you want to log out of your quiz portal profile?")) {
        localStorage.removeItem('quiz_user_email');
        currentUserEmail = '';
        renderAuth('login');
      }
    }

    async function startQuizFlow() {
      document.getElementById('app-content').innerHTML = `
        <div class="text-center py-20">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
          <p class="mt-4 text-sm text-slate-500">Mapping testing modules...</p>
        </div>
      `;

      const response = await callAPI('getTodayQuiz');
      if (response && response.questions && response.questions.length > 0) {
        quizQuestions = response.questions;
        currentQuestionIndex = 0;
        userSelections = [];
        correctAnswersCount = 0;
        renderQuestion();
      } else {
        alert("Failed to retrieve quiz strings from data rows.");
        loadDashboard();
      }
    }

    function renderQuestion() {
      const q = quizQuestions[currentQuestionIndex];
      const visualProgress = ((currentQuestionIndex) / quizQuestions.length) * 100;

      let selectionsHtml = q.options.map((opt, i) => {
        const optionIdentifier = String.fromCharCode(65 + i); // Maps array offsets directly into A, B, C, D
        return `
          <button onclick="processAnswerSelection('${optionIdentifier}')" class="w-full text-left border border-slate-200 hover:border-indigo-500 hover:bg-indigo-50/30 p-3.5 rounded-xl transition text-sm flex items-center space-x-3">
            <span class="w-6 h-6 flex items-center justify-center rounded-full bg-slate-100 border text-slate-700 font-bold text-xs">${optionIdentifier}</span>
            <span class="text-slate-700 font-medium">${opt}</span>
          </button>
        `;
      }).join('');

      document.getElementById('app-content').innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-center text-xs font-semibold text-slate-400 uppercase">
            <span>Item ${currentQuestionIndex + 1} of ${quizQuestions.length}</span>
            <span>Completion ${Math.round(visualProgress)}%</span>
          </div>
          
          <div class="w-full bg-slate-100 h-1.5 rounded-full overflow-hidden">
            <div class="bg-indigo-600 h-full transition-all duration-300" style="width: ${visualProgress}%"></div>
          </div>

          <div class="bg-slate-50 p-5 rounded-2xl border border-slate-100 min-h-[100px] flex items-center">
            <h3 class="text-base font-bold text-slate-800 leading-relaxed">${q.question}</h3>
          </div>

          <div class="space-y-3">
            ${selectionsHtml}
          </div>
        </div>
      `;
    }

    function processAnswerSelection(chosenLetter) {
      const currentQ = quizQuestions[currentQuestionIndex];
      userSelections.push({
        question: currentQ.question,
        selected: chosenLetter,
        correct: currentQ.answer
      });

      if (chosenLetter === currentQ.answer) {
        correctAnswersCount++;
      }

      currentQuestionIndex++;
      if (currentQuestionIndex < quizQuestions.length) {
        renderQuestion();
      } else {
        dispatchQuizEvaluation();
      }
    }

    async function dispatchQuizEvaluation() {
      document.getElementById('app-content').innerHTML = `
        <div class="text-center py-20">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
          <p class="mt-4 text-sm text-slate-500">Writing structural scores to central log sheets...</p>
        </div>
      `;

      await callAPI('submitQuiz', {
        score: correctAnswersCount,
        answers: userSelections
      });

      renderEvaluationInterface();
    }

    function renderEvaluationInterface() {
      let breakdownHtml = userSelections.map((sel, idx) => {
        const isCorrect = sel.selected === sel.correct;
        return `
          <div class="p-3.5 rounded-xl border ${isCorrect ? 'bg-emerald-50/50 border-emerald-100' : 'bg-rose-50/50 border-rose-100'} text-xs space-y-1">
            <p class="font-bold text-slate-800">${idx+1}. ${sel.question}</p>
            <div class="flex items-center space-x-4 mt-1">
              <span class="${isCorrect ? 'text-emerald-700' : 'text-rose-700'} font-semibold">Selected: ${sel.selected}</span>
              <span class="text-slate-500 font-semibold">Answer Key: ${sel.correct}</span>
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('app-content').innerHTML = `
        <div class="space-y-6">
          <div class="text-center space-y-2">
            <h2 class="text-2xl font-black text-slate-900">Evaluation Saved!</h2>
            <p class="text-sm text-slate-500">Result score tier: <span class="text-indigo-600 font-bold text-base">${correctAnswersCount} / ${quizQuestions.length}</span> correct operations completed.</p>
          </div>

          <div class="space-y-3">
            <h3 class="text-xs font-bold uppercase tracking-wider text-slate-400">Answer Metric Audit Log</h3>
            ${breakdownHtml}
          </div>

          <button onclick="loadDashboard()" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold text-sm shadow-md hover:bg-slate-800 transition">
            Return to Profile Dashboard
          </button>
        </div>
      `;
    }

    async function triggerAccountDeletion() {
      let explanation = prompt("An administrative deletion trace reason is required to wipe database rows:");
      if (explanation === null) return;
      
      if (!explanation.trim()) {
        alert("Action aborted. Accounts cannot be dropped without an entry log verification reason.");
        return;
      }

      if (confirm("Warning: Confirming will execute an irreversible permanent deletion query across your registration lines and performance tables. Proceed?")) {
        document.getElementById('app-content').innerHTML = `
          <div class="text-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-rose-600 border-b-2 mx-auto"></div>
            <p class="mt-4 text-sm text-rose-500 font-medium">Executing complete profile database trace purge...</p>
          </div>
        `;

        const response = await callAPI('closeAccount', { reason: explanation });
        if (response && response.success) {
          alert("Data structures purged. Profile context unmapped successfully.");
          localStorage.removeItem('quiz_user_email');
          location.reload();
        } else {
          alert("Data cleanup operation encountered an administrative error loop.");
          loadDashboard();
        }
      }
    }

    // =========================================================================
    // ADMIN FLOW INTERFACE MODULES
    // =========================================================================

    function renderAdminLogin() {
      document.getElementById('app-content').innerHTML = `
        <div class="space-y-6">
          <div class="text-center pb-2">
            <h2 class="text-2xl font-bold text-slate-900">Admin Authentication</h2>
            <p class="text-sm text-slate-500 mt-1">Provide the master passcode to enter the management console.</p>
          </div>
          
          <div class="space-y-4">
            <div>
              <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">Admin Passcode</label>
              <input id="admin-pass" type="password" class="w-full border border-slate-200 p-2.5 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="••••••••">
            </div>
            
            <div class="flex gap-2">
              <button onclick="renderAuth('login')" class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-700 py-3 rounded-xl font-bold text-sm transition">
                Back
              </button>
              <button onclick="handleAdminLogin()" class="w-2/3 bg-slate-950 hover:bg-slate-900 text-white py-3 rounded-xl font-bold text-sm tracking-wide shadow-md transition">
                Authenticate
              </button>
            </div>
          </div>
        </div>
      `;
    }

    async function handleAdminLogin() {
      const pass = document.getElementById('admin-pass').value.trim();
      if (!pass) {
        alert("Passcode cannot be left blank.");
        return;
      }
      sessionStorage.setItem('admin_password', pass);
      loadAdminDashboard();
    }

    async function loadAdminDashboard() {
      document.getElementById('app-content').innerHTML = `
        <div class="text-center py-20">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-slate-950 mx-auto"></div>
          <p class="mt-4 text-sm text-slate-500">Retrieving question database and logs...</p>
        </div>
      `;

      const res = await callAPI('getAdminQuestions');
      if (res && res.success === false) {
        alert(res.error || "Authentication verification failed.");
        sessionStorage.removeItem('admin_password');
        renderAdminLogin();
      } else {
        renderAdminDashboard(res.questions || []);
      }
    }

    function renderAdminDashboard(questions) {
      const todayISO = new Date().toISOString().split('T')[0];
      
      let listHtml = questions.map(q => `
        <div class="bg-white p-3.5 rounded-xl border border-slate-200 text-xs space-y-1 shadow-sm">
          <div class="flex justify-between items-center text-slate-400 font-bold mb-1">
            <span>📅 Target Date: ${q.date}</span>
            <span class="bg-indigo-50 text-indigo-700 px-2 py-0.5 rounded-full text-[10px]">Key: ${q.answer}</span>
          </div>
          <p class="font-bold text-slate-800 leading-snug">${q.question}</p>
          <div class="grid grid-cols-2 gap-x-2 gap-y-1 text-slate-500 pt-1">
            <span>A: ${q.optionA}</span>
            <span>B: ${q.optionB}</span>
            <span>C: ${q.optionC}</span>
            <span>D: ${q.optionD}</span>
          </div>
        </div>
      `).join('');

      document.getElementById('app-content').innerHTML = `
        <div class="space-y-6">
          <div class="flex justify-between items-center pb-2 border-b">
            <div>
              <h2 class="text-xl font-bold text-slate-900">Admin Panel</h2>
              <p class="text-xs text-slate-400">Manage daily testing inventory.</p>
            </div>
            <button onclick="handleAdminLogout()" class="text-xs bg-slate-100 hover:bg-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-bold transition">
              Exit Panel
            </button>
          </div>

          <!-- Question Input Form -->
          <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200/60 space-y-3">
            <h3 class="font-bold text-sm text-slate-800">➕ Add New Question</h3>
            
            <div class="grid grid-cols-2 gap-2">
              <div class="col-span-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Target Date</label>
                <input id="q-date" type="date" value="${todayISO}" class="w-full border border-slate-200 p-2 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div class="col-span-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Question Text</label>
                <input id="q-text" type="text" placeholder="What does HTML stand for?" class="w-full border border-slate-200 p-2 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Option A</label>
                <input id="q-a" type="text" placeholder="Choice A" class="w-full border border-slate-200 p-2 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Option B</label>
                <input id="q-b" type="text" placeholder="Choice B" class="w-full border border-slate-200 p-2 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Option C</label>
                <input id="q-c" type="text" placeholder="Choice C" class="w-full border border-slate-200 p-2 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div>
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Option D</label>
                <input id="q-d" type="text" placeholder="Choice D" class="w-full border border-slate-200 p-2 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500">
              </div>
              <div class="col-span-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase mb-0.5">Correct Answer Key</label>
                <select id="q-correct" class="w-full border border-slate-200 p-2 rounded-lg text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                  <option value="A">Option A</option>
                  <option value="B">Option B</option>
                  <option value="C">Option C</option>
                  <option value="D">Option D</option>
                </select>
              </div>
            </div>

            <button onclick="handleAddQuestionSubmit()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 rounded-xl font-bold text-xs tracking-wide shadow-sm transition mt-2">
              Commit to Question Database
            </button>
          </div>

          <!-- Existing Questions List -->
          <div class="space-y-2">
            <h3 class="font-bold text-xs uppercase tracking-wider text-slate-400">Current Question Inventory</h3>
            <div class="space-y-3 max-h-[300px] overflow-y-auto pr-1">
              ${listHtml || '<p class="text-xs text-slate-400 py-4 text-center">No loaded questions found inside the quizzes tab.</p>'}
            </div>
          </div>
        </div>
      `;
    }

    async function handleAddQuestionSubmit() {
      const data = {
        date: document.getElementById('q-date').value,
        question: document.getElementById('q-text').value.trim(),
        optionA: document.getElementById('q-a').value.trim(),
        optionB: document.getElementById('q-b').value.trim(),
        optionC: document.getElementById('q-c').value.trim(),
        optionD: document.getElementById('q-d').value.trim(),
        answer: document.getElementById('q-correct').value
      };

      if (!data.date || !data.question || !data.optionA || !data.optionB || !data.optionC || !data.optionD || !data.answer) {
        alert("All fields are mandatory to record a functional quiz question.");
        return;
      }

      document.getElementById('app-content').innerHTML = `
        <div class="text-center py-20">
          <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-indigo-600 mx-auto"></div>
          <p class="mt-4 text-sm text-slate-500">Processing database write request...</p>
        </div>
      `;

      const response = await callAPI('addQuestion', { data: data });
      if (response && response.success) {
        alert(response.message);
        loadAdminDashboard();
      } else {
        alert(response && response.error ? response.error : "Question append rejected by system.");
        loadAdminDashboard();
      }
    }

    function handleAdminLogout() {
      sessionStorage.removeItem('admin_password');
      renderAuth('login');
    }
  </script>
</body>
</html>
